<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Fullscreen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0f0f1a;
            font-family: Arial, sans-serif;
        }

        .carousel {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            cursor: grab;
            touch-action: pan-y;
        }

        .carousel:active {
            cursor: grabbing;
        }

        .carousel-track {
            display: flex;
            height: 100%;
            transition: transform 0.3s ease-out;
        }

        .carousel.dragging .carousel-track {
            transition: none;
        }

        .slide {
            min-width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            user-select: none;
        }

        .slide-label {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 500;
        }

        .indicators {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .dot.active {
            background: #64ffda;
            width: 32px;
            border-radius: 5px;
        }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .nav-btn:hover {
            border-color: #64ffda;
            color: #64ffda;
            background: rgba(0,0,0,0.8);
        }

        .nav-btn:active {
            transform: translateY(-50%) scale(0.95);
        }

        .nav-btn.prev { left: 20px; }
        .nav-btn.next { right: 20px; }

        .hint {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="carousel" id="carousel">
        <div class="carousel-track" id="track">
            <div class="slide">
                <img src="https://placehold.co/800x600/e94560/ffffff?text=Slide+1" alt="Slide 1">
                <span class="slide-label">Imagem 1</span>
            </div>
            <div class="slide">
                <img src="https://placehold.co/800x600/0f3460/ffffff?text=Slide+2" alt="Slide 2">
                <span class="slide-label">Imagem 2</span>
            </div>
            <div class="slide">
                <img src="https://placehold.co/800x600/16213e/ffffff?text=Slide+3" alt="Slide 3">
                <span class="slide-label">Imagem 3</span>
            </div>
            <div class="slide">
                <img src="https://placehold.co/800x600/1a1a2e/64ffda?text=Slide+4" alt="Slide 4">
                <span class="slide-label">Imagem 4</span>
            </div>
            <div class="slide">
                <img src="https://placehold.co/800x600/533483/ffffff?text=Slide+5" alt="Slide 5">
                <span class="slide-label">Imagem 5</span>
            </div>
        </div>

        <button class="nav-btn prev" id="prevBtn">←</button>
        <button class="nav-btn next" id="nextBtn">→</button>

        <div class="indicators" id="indicators"></div>

        <p class="hint">← Arraste ou use os botões →</p>
    </div>

    <script>
        const carousel = document.getElementById('carousel');
        const track = document.getElementById('track');
        const slides = document.querySelectorAll('.slide');
        const indicators = document.getElementById('indicators');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        let currentIndex = 0;
        let startX = 0;
        let currentTranslate = 0;
        let prevTranslate = 0;
        let isDragging = false;
        let animationID = 0;

        // Criar indicadores
        slides.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            if (i === 0) dot.classList.add('active');
            dot.addEventListener('click', () => goToSlide(i));
            indicators.appendChild(dot);
        });

        const dots = document.querySelectorAll('.dot');

        function updateIndicators() {
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentIndex);
            });
        }

        function goToSlide(index) {
            currentIndex = index;
            if (currentIndex < 0) currentIndex = slides.length - 1;
            if (currentIndex >= slides.length) currentIndex = 0;

            currentTranslate = -currentIndex * carousel.offsetWidth;
            prevTranslate = currentTranslate;
            setSliderPosition();
            updateIndicators();
        }

        function setSliderPosition() {
            track.style.transform = `translateX(${currentTranslate}px)`;
        }

        function animation() {
            setSliderPosition();
            if (isDragging) requestAnimationFrame(animation);
        }

        // Mouse Events
        carousel.addEventListener('mousedown', dragStart);
        carousel.addEventListener('mousemove', drag);
        carousel.addEventListener('mouseup', dragEnd);
        carousel.addEventListener('mouseleave', dragEnd);

        // Touch Events
        carousel.addEventListener('touchstart', dragStart);
        carousel.addEventListener('touchmove', drag);
        carousel.addEventListener('touchend', dragEnd);

        function dragStart(e) {
            isDragging = true;
            startX = getPositionX(e);
            carousel.classList.add('dragging');
            animationID = requestAnimationFrame(animation);
        }

        function drag(e) {
            if (!isDragging) return;
            const currentPosition = getPositionX(e);
            currentTranslate = prevTranslate + currentPosition - startX;
        }

        function dragEnd() {
            isDragging = false;
            cancelAnimationFrame(animationID);
            carousel.classList.remove('dragging');

            const movedBy = currentTranslate - prevTranslate;
            const threshold = carousel.offsetWidth * 0.2;

            if (movedBy < -threshold) {
                currentIndex++;
            } else if (movedBy > threshold) {
                currentIndex--;
            }

            goToSlide(currentIndex);
        }

        function getPositionX(e) {
            return e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
        }

        // Botões
        prevBtn.addEventListener('click', () => goToSlide(currentIndex - 1));
        nextBtn.addEventListener('click', () => goToSlide(currentIndex + 1));

        // Teclado
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') goToSlide(currentIndex - 1);
            if (e.key === 'ArrowRight') goToSlide(currentIndex + 1);
        });

        // Recalcular ao redimensionar
        window.addEventListener('resize', () => {
            goToSlide(currentIndex);
        });
    </script>
</body>
</html>
