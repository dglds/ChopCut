# This is a full-line comment.
# TOML (Tom's Obvious, Minimal Language) is a configuration file format.[1][2]

# --- Basic Key-Value Pairs ---
# Keys are on the left of the equals sign, values on the right.[3]
# Whitespace around keys and values is ignored.[3]
title = "TOML Example Configuration" # This is a comment at the end of a line.[4]

# Strings
name = "Jane Doe"
product_name = 'My Awesome App' # Literal strings don't process escape sequences.[2]

# Integers
version_major = 1
version_minor = 2
version_patch = 0
# Integers can include underscores for readability.
large_number = 1_000_000

# Floats
pi = 3.14159
# Floats can also use scientific notation.
speed_of_light = 2.99792458e8
# Special float values
infinity = inf
negative_infinity = -inf
not_a_number = nan

# Booleans
enabled = true
debug_mode = false

# Datetime (Offset Date-Time, Local Date-Time, Local Date, Local Time)
# Offset Date-Time (RFC 3339 formatted)
release_datetime = 1979-05-27T07:32:00-08:00
# Local Date-Time
local_datetime = 1979-05-27T07:32:00
# Local Date
local_date = 1979-05-27
# Local Time
local_time = 07:32:00

# Arrays (can contain values of different types, but typically homogeneous)[5]
ports = [ 8000, 8001, 8002 ]
colors = ["red", "green", "blue"]
mixed_array = [1, "hello", true, 3.14]
# Arrays can be broken over multiple lines.[1]
hosts = [
  "alpha",
  "omega",
  "gamma",
]

# --- String Types ---
# Basic strings are surrounded by quotation marks.[2]
basic_string = "I'm a basic string. "Quotes" and \backslashes\ need escaping."

# Multi-line basic strings are surrounded by three quotation marks.[2][3]
# Newlines immediately following the opening delimiter are trimmed.[3]
multi_line_basic_string = """
This is a multi-line basic string.
It can span multiple lines.
"Quotes" and \backslashes\ still need escaping.
"""

# Literal strings are surrounded by single quotes.[2]
# No escaping is performed.[2]
literal_string = 'C:\Users\username\Documents'

# Multi-line literal strings are surrounded by three single quotes.[2]
multi_line_literal_string = '''
This is a multi-line literal string.
No escaping here, even for "quotes" or \backslashes\.
'''

# --- Tables (Sections) ---
# Tables are defined using square brackets.[6]
[database]
server = "192.168.1.1"
connection_max = 5000
enabled = true

# --- Nested Tables ---
# Nested tables are created by using dots in the table name.
[database.replication]
master = "db1.example.com"
slaves = ["db2.example.com", "db3.example.com"]

# --- Inline Tables ---
# Inline tables provide a compact syntax for expressing tables on a single line.[3]
# They are defined within curly braces.[3]
owner = { name = "Tom Preston-Werner", dob = 1979-05-27T07:32:00-08:00 }
metadata = { author = "AI Assistant", version = "1.0" }

# --- Arrays of Tables ---
# Arrays of tables are defined using double square brackets.[6]
# Each [[item]] starts a new table in the array.
[[servers]]
ip = "10.0.0.1"
dc = "eqdc10"

[[servers]]
ip = "10.0.0.2"
dc = "eqdc10"
# You can add more fields to an array of tables.
role = "backup"

[[clients]]
data = [ ["gamma", "delta"], [1, 2] ]
hosts = [ "alpha", "omega" ]
